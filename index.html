<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monet Media Productions</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      html {
        background: url(/monetmedia/img/bg.jpg);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: env(safe-area-inset-top);
      }

      footer {
        margin-top: auto;
        width: 100%;
        color: ghostwhite;
        text-align: center;
        font-size: 10px;
        animation: fadeIn 0.7s ease forwards;
      }

      footer span {
        color: ghostwhite;
        font-weight: bold;
      }

      footer a {
        color: ghostwhite;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      header {
        color: white;
        padding: 2em;
        text-align: center;
        width: 100%;
      }

      h1 {
        margin: 0.2em 0;
        font-size: 2em;
      }

      p {
        color: white;
        margin: 0.5em 0 2em 0;
      }

      #copyright {
        color: ghostwhite;
      }

      .links {
        width: 90%;
        max-width: 300px;
      }

      /* LINK STYLE */
      .link {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white;
        margin: 0.5em 0;
        padding: 1em;
        border-radius: 8px;
        text-decoration: none;
        color: #222;
        font-weight: bold;
        transition: background 0.3s;
        position: relative;
      }

      .link:hover {
        background-color: #ddd;
      }
      /* SMALL LOGO */
      .link-logo {
        position: absolute;
        left: 56px;
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      .profile-pic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        margin-bottom: 1em;
        object-fit: cover;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      }

      @media (max-width: 480px) {
        html {
          padding-top: env(safe-area-inset-top);
          overflow: hidden;
        }
        footer {
          margin-top: 18.5em;
          color: ghostwhite;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <img
        class="profile-pic"
        src="/monetmedia/img/monet-logo.jpg"
        alt="Profile Picture"
      />
      <h1>Monet Media Productions</h1>
      <p>
        Transformamos ideas en producciónes impactantes <br />
        📸 Fotografía | 🎬 Producción
      </p>
    </header>

    <div class="links">
      <a
        class="link"
        href="https://instagram.com/monetmediaproductions"
        target="_blank"
      >
        <img
          class="link-logo"
          src="/monetmedia/img/whitegram-logo.png"
          alt="Instagram logo"
        />
        Instagram
      </a>
      <br />

      <a class="link" href="tel:4133069008" target="_blank">
        <img
          class="link-logo"
          src="/monetmedia/img/contact.png"
          alt="Phone logo"
        />
        Contact Me
      </a>
    </div>

    <footer>
      <p id="copyright">© 2026 <span>ThriveNFC</span>. All Rights Reserved.</p>
    </footer>
  </body>
</html>
